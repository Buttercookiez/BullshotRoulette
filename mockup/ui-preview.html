<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revolver Roulette — 2.5D UI Mockup</title>
    <style>
      :root {
        --bg-0: #050507;
        --bg-1: #0b0d10;
        --paper: #1b1f24;
        --paper-light: #2a3038;
        --paper-edge: #070809;
        --accent: #7ec850;
        --accent-dim: #3c5a2c;
        --blood: #8e2b22;
        --bone: #cdc6b8;
        --muted: #6b6f76;
        --outline: #000;
        --tilt: 56deg;     /* world tilt; actors counter-rotate by this */
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg-0);
        font-family: "Courier New", ui-monospace, monospace;
        color: var(--bone);
        overflow: hidden;
      }

      #scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(120% 90% at 50% 8%, rgba(126, 200, 80, 0.06), transparent 55%),
          radial-gradient(120% 120% at 50% 130%, #000 40%, transparent 70%),
          linear-gradient(180deg, var(--bg-1), var(--bg-0));
        perspective: 1200px;
        perspective-origin: 50% 38%;
      }

      /* faint blood-grid backdrop (parallax: drifts opposite the sway) */
      .backdrop {
        position: absolute;
        inset: -20%;
        background-image:
          linear-gradient(rgba(142, 43, 34, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(142, 43, 34, 0.06) 1px, transparent 1px);
        background-size: 54px 54px;
        opacity: 0.5;
        pointer-events: none;
        animation: drift 12s ease-in-out infinite alternate;
      }
      @keyframes drift {
        from { transform: translateX(-16px); }
        to   { transform: translateX(16px); }
      }

      /* Overhead spotlight cone with dim flicker */
      .spotlight {
        position: absolute;
        top: -16%; left: 50%;
        width: 64%; height: 130%;
        transform: translateX(-50%);
        background: radial-gradient(46% 40% at 50% 26%, rgba(220, 225, 210, 0.18), transparent 62%);
        mix-blend-mode: screen;
        pointer-events: none;
        animation: flicker 240ms infinite steps(2, end);
        z-index: 5;
      }
      @keyframes flicker {
        0% { opacity: 0.95; } 50% { opacity: 0.8; }
        51% { opacity: 0.99; } 100% { opacity: 0.85; }
      }

      /* ---- 3D camera + world ---- */
      .camera {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        animation: sway 12s ease-in-out infinite alternate;
      }
      @keyframes sway {
        from { transform: rotateY(-3deg) translateX(-10px); }
        to   { transform: rotateY(3deg)  translateX(10px); }
      }

      .world {
        position: absolute;
        left: 50%; top: 46%;
        transform-style: preserve-3d;
        transform: translate(-50%, -50%) rotateX(var(--tilt));
      }

      /* The table top lies in the tilted plane */
      .floor {
        position: relative;
        width: 720px; height: 470px;
        transform-style: preserve-3d;
        border-radius: 26px;
        background:
          radial-gradient(72% 64% at 50% 30%, #20262c, #14181d 70%, #0c1014 100%);
        border: 3px solid var(--outline);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.05), inset 0 0 90px rgba(0,0,0,0.6);
      }

      /* Extruded "cardboard" edge: a vertical face hanging from the front edge */
      .lip {
        position: absolute;
        left: -3px; right: -3px;
        top: 100%;
        height: 46px;
        transform-origin: top center;
        transform: rotateX(calc(-1 * var(--tilt)));
        background: linear-gradient(180deg, #0a0c0e, #000);
        border: 3px solid var(--outline);
        border-top: none;
        border-radius: 0 0 26px 26px;
        box-shadow: 0 30px 50px rgba(0,0,0,0.8);
      }

      /* ground shadows stay flat in the floor plane */
      .gshadow {
        position: absolute;
        transform: translate(-50%, -50%);
        background: radial-gradient(closest-side, rgba(0,0,0,0.75), transparent);
        filter: blur(3px);
        border-radius: 50%;
      }

      /* ---- Billboard actors: stand upright off the floor ---- */
      .billboard {
        position: absolute;
        transform-origin: 50% 100%;
        transform: translate(-50%, -100%) rotateX(calc(-1 * var(--tilt)));
        transform-style: preserve-3d;
        text-align: center;
      }
      .bob { animation: bob 4s ease-in-out infinite alternate; }
      @keyframes bob {
        from { transform: translateY(0); }
        to   { transform: translateY(-5px); }
      }

      .card {
        width: 118px; height: 152px;
        border-radius: 12px 12px 9px 9px;
        border: 3px solid var(--outline);
        background: linear-gradient(160deg, var(--paper-light), var(--paper));
        box-shadow: inset 0 -24px 32px rgba(0,0,0,0.55), inset 0 3px 0 rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: center;
        font-size: 66px; line-height: 1;
        filter: saturate(0.6);
      }
      .nameplate {
        margin-top: 10px; font-size: 12px; letter-spacing: 2px; color: var(--muted);
      }
      .dealer-card { filter: saturate(0.45) brightness(0.82); }

      /* Revolver standing card */
      .cylinder {
        width: 92px; height: 92px; border-radius: 50%;
        border: 4px solid var(--outline);
        background: radial-gradient(circle at 50% 38%, #3a4048, #1a1e23 72%);
        box-shadow: 0 12px 20px rgba(0,0,0,0.6), inset 0 0 0 6px #0d1014;
        position: relative; margin: 0 auto;
        animation: spin 18s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .cylinder .hub {
        position: absolute; inset: 38px; border-radius: 50%;
        background: radial-gradient(circle, #4a525b, #20262c); border: 2px solid #000;
      }
      .cylinder .chamber {
        position: absolute; width: 16px; height: 16px; border-radius: 50%;
        background: #0a0c0f; border: 2px solid #000; top: 50%; left: 50%; margin: -8px;
      }
      .gun-label {
        margin-top: 8px; font-size: 11px; letter-spacing: 2px;
        color: var(--accent); text-shadow: 0 0 8px rgba(126,200,80,0.4);
      }

      /* shell tokens standing on the table near the player */
      .shell {
        width: 13px; height: 24px; border-radius: 3px; border: 2px solid #000;
        display: inline-block;
      }
      .shell.live  { background: linear-gradient(180deg, var(--blood), #4d1611); }
      .shell.blank { background: linear-gradient(180deg, #6a6f77, #2c3036); }

      /* ================= HUD (screen-space) ================= */
      .id-card {
        position: fixed; top: 18px; width: 232px; padding: 10px 12px;
        background: linear-gradient(160deg, #161a1f, #0e1115);
        border: 2px solid #000; border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
        z-index: 20;
      }
      .id-card.left { left: 18px; } .id-card.right { right: 18px; }
      .id-head { display: flex; justify-content: space-between; align-items: baseline; }
      .id-name { font-size: 14px; letter-spacing: 3px; }
      .id-tag  { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
      .hp { margin-top: 8px; display: flex; gap: 6px; }
      .pip {
        width: 18px; height: 18px; border-radius: 4px; border: 2px solid #000;
        background: linear-gradient(180deg, var(--blood), #3f120e);
        box-shadow: 0 0 8px rgba(142,43,34,0.5);
      }
      .pip.lost { background: #1a1c1f; box-shadow: none; }

      .title {
        position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
        font-size: 16px; letter-spacing: 6px; z-index: 20; color: #d8d2c4;
        text-shadow: -1.5px 0 rgba(142,43,34,0.7), 1.5px 0 rgba(80,160,200,0.5);
      }
      .banner {
        position: fixed; top: 78px; left: 50%; transform: translateX(-50%);
        font-size: 13px; letter-spacing: 4px; color: var(--accent);
        text-shadow: 0 0 10px rgba(126,200,80,0.5); z-index: 20;
      }

      .actions {
        position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 14px; z-index: 20;
      }
      .btn {
        font-family: inherit; letter-spacing: 2px; font-size: 12px; padding: 12px 18px;
        color: var(--bone); background: linear-gradient(180deg, #1c2128, #11151a);
        border: 2px solid #000; border-radius: 8px; cursor: pointer;
        box-shadow: 0 4px 0 #000, 0 6px 14px rgba(0,0,0,0.5);
      }
      .btn:hover { filter: brightness(1.2); }
      .btn.shoot-self { border-color: var(--accent-dim); color: var(--accent); }
      .btn.shoot-foe  { border-color: var(--blood); color: #e88; }
      .btn.spin       { color: var(--muted); }

      .belt {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px; padding: 10px;
        background: linear-gradient(160deg, #141820, #0c0f14);
        border: 2px solid #000; border-radius: 12px;
        box-shadow: 0 8px 22px rgba(0,0,0,0.6); z-index: 20;
      }
      .slot {
        width: 52px; height: 52px; border-radius: 8px; border: 2px solid #000;
        background: radial-gradient(circle at 50% 35%, #232a31, #11151a);
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .slot.usable { box-shadow: 0 0 0 2px rgba(126,200,80,0.5), 0 0 14px rgba(126,200,80,0.35); }
      .slot.usable:hover { transform: translateY(-4px) scale(1.05); }
      .slot.empty { opacity: 0.35; }

      /* ================= retro post-processing ================= */
      .scanlines, .vignette, .grain { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
      .scanlines {
        background: repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 2px, transparent 3px);
        mix-blend-mode: multiply;
      }
      .vignette { background: radial-gradient(120% 100% at 50% 42%, transparent 52%, rgba(0,0,0,0.88) 100%); }
      .grain {
        opacity: 0.06;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        animation: grainshift 600ms steps(3) infinite;
      }
      @keyframes grainshift {
        0% { transform: translate(0,0); } 33% { transform: translate(-3%, 2%); }
        66% { transform: translate(2%, -2%); } 100% { transform: translate(0,0); }
      }
    </style>
  </head>
  <body>
    <div id="scene">
      <div class="backdrop"></div>

      <div class="camera">
        <div class="world">
          <div class="floor">
            <!-- extruded cardboard edge -->
            <div class="lip"></div>

            <!-- flat ground shadows (in floor plane) -->
            <div class="gshadow" style="left:50%; top:20%; width:150px; height:42px;"></div>
            <div class="gshadow" style="left:50%; top:50%; width:120px; height:38px;"></div>
            <div class="gshadow" style="left:50%; top:82%; width:150px; height:42px;"></div>

            <!-- Dealer (far side) -->
            <div class="billboard" style="left:50%; top:20%;">
              <div class="bob">
                <div class="card dealer-card">&#x1F480;</div>
                <div class="nameplate">THE DEALER</div>
              </div>
            </div>

            <!-- Revolver (center) -->
            <div class="billboard" style="left:50%; top:50%;">
              <div class="cylinder">
                <div class="hub"></div>
                <div class="chamber" style="transform: translate(0,-30px)"></div>
                <div class="chamber" style="transform: translate(26px,-15px)"></div>
                <div class="chamber" style="transform: translate(26px,15px)"></div>
                <div class="chamber" style="transform: translate(0,30px)"></div>
                <div class="chamber" style="transform: translate(-26px,15px)"></div>
                <div class="chamber" style="transform: translate(-26px,-15px)"></div>
              </div>
              <div class="gun-label">2 LIVE &middot; 3 BLANK</div>
            </div>

            <!-- Player (near side) -->
            <div class="billboard" style="left:50%; top:82%;">
              <div class="bob">
                <div class="card">&#x1F3AD;</div>
                <div class="nameplate">YOU</div>
              </div>
            </div>

            <!-- shell tokens standing near the player -->
            <div class="billboard" style="left:50%; top:67%;">
              <span class="shell live"></span>
              <span class="shell live"></span>
              <span class="shell blank"></span>
              <span class="shell blank"></span>
              <span class="shell blank"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="spotlight"></div>

      <!-- HUD -->
      <div class="title">REVOLVER&nbsp;ROULETTE</div>
      <div class="banner">YOUR TURN</div>

      <div class="id-card left">
        <div class="id-head"><span class="id-name">YOU</span><span class="id-tag">CHALLENGER</span></div>
        <div class="hp"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip lost"></span></div>
      </div>
      <div class="id-card right">
        <div class="id-head"><span class="id-tag">HOUSE</span><span class="id-name">DEALER</span></div>
        <div class="hp"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
      </div>

      <div class="actions">
        <button class="btn shoot-self">SHOOT SELF</button>
        <button class="btn spin">SPIN</button>
        <button class="btn shoot-foe">SHOOT DEALER</button>
      </div>

      <div class="belt">
        <div class="slot usable" title="Magnifying Glass">&#x1F50D;</div>
        <div class="slot usable" title="Speed Loader">&#x1F501;</div>
        <div class="slot usable" title="Medkit">&#x2795;</div>
        <div class="slot usable" title="Handcuffs">&#x1F517;</div>
        <div class="slot empty">&#x2022;</div>
        <div class="slot empty">&#x2022;</div>
      </div>

      <div class="grain"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>
  </body>
</html>
